<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Checkout - TG's Kitchen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary-red: #E53935;
      --dark-bg: #1a1a1a;
      --light-pink: #FFEBEE;
      --text-dark: #212121;
      --text-gray: #757575;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: var(--text-dark);
      padding-bottom: 80px;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-dark);
      text-decoration: none;
    }
    
    .header-title {
      font-size: 18px;
      font-weight: 700;
    }
    
    /* Main Content */
    .main-content {
      margin-top: 64px;
      padding: 16px;
    }
    
    /* Order Summary */
    .summary-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    
    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    
    .order-item:last-child {
      border-bottom: none;
    }
    
    .item-info {
      display: flex;
      flex-direction: column;
    }
    
    .item-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .item-qty {
      font-size: 13px;
      color: var(--text-gray);
    }
    
    .item-price {
      font-weight: 600;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-weight: 600;
    }
    
    .summary-row.total {
      font-size: 18px;
      color: var(--primary-red);
    }
    
    /* Form */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-dark);
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary-red);
    }
    
    textarea.form-input {
      min-height: 80px;
      resize: vertical;
    }
    
    .delivery-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .delivery-option {
      display: flex;
      align-items: center;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .delivery-option.selected {
      border-color: var(--primary-red);
      background: var(--light-pink);
    }
    
    .delivery-option input {
      display: none;
    }
    
    .option-radio {
      width: 20px;
      height: 20px;
      border: 2px solid #ccc;
      border-radius: 50%;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .delivery-option.selected .option-radio {
      border-color: var(--primary-red);
    }
    
    .delivery-option.selected .option-radio::after {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--primary-red);
      border-radius: 50%;
    }
    
    .option-info {
      flex: 1;
    }
    
    .option-name {
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .option-price {
      font-size: 13px;
      color: var(--text-gray);
    }
    
    /* Place Order Button */
    .place-order-btn {
      width: 100%;
      background: var(--primary-red);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .place-order-btn:active {
      transform: scale(0.98);
    }
    
    .place-order-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      border-top: 1px solid #f0f0f0;
      z-index: 1000;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-gray);
      font-size: 11px;
      padding: 4px 12px;
    }
    
    .nav-item.active {
      color: var(--primary-red);
    }
    
    .nav-item i {
      font-size: 22px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-state i {
      font-size: 64px;
      color: #ddd;
      margin-bottom: 16px;
    }
    
    .empty-state h3 {
      margin-bottom: 8px;
    }
    
    .empty-state p {
      color: var(--text-gray);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="/cart" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="header-title">Checkout</h1>
    <span style="width: 40px;"></span>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Content loaded dynamically -->
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="/menu" class="nav-item">
      <i class="fas fa-utensils"></i>
      <span>Menu</span>
    </a>
    <a href="/gallery" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Gallery</span>
    </a>
    <a href="/cart" class="nav-item">
      <i class="fas fa-shopping-bag"></i>
      <span>Cart</span>
    </a>
    <a href="/account" class="nav-item active">
      <i class="fas fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <script>
    let cart = [];
    let deliveryFee = 0;
    let selectedArea = '';
    
    const deliveryAreas = [
      { name: 'Inside Town', fee: 1500 },
      { name: 'Bonsac', fee: 1000 },
      { name: 'Ibuzor', fee: 2500 },
      { name: 'Ogwashi', fee: 4000 }
    ];
    
    function loadCheckout() {
      cart = JSON.parse(localStorage.getItem('cart')) || [];
      
      if (cart.length === 0) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-shopping-bag"></i>
            <h3>Your cart is empty</h3>
            <p>Add some items before checkout</p>
            <a href="/menu" class="btn-primary" style="background: var(--primary-red); color: white; padding: 14px 32px; border-radius: 25px; text-decoration: none; display: inline-block; font-weight: 600;">Browse Menu</a>
          </div>
        `;
        return;
      }
      
      renderCheckout();
    }
    
    function renderCheckout() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      let orderItemsHtml = cart.map(item => `
        <div class="order-item">
          <div class="item-info">
            <span class="item-name">${item.name}</span>
            <span class="item-qty">Qty: ${item.quantity}</span>
          </div>
          <span class="item-price">₦${(item.price * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');
      
      let deliveryOptionsHtml = deliveryAreas.map((area, index) => `
        <label class="delivery-option ${index === 0 ? 'selected' : ''}" onclick="selectDelivery(${index})">
          <input type="radio" name="delivery" value="${area.fee}" ${index === 0 ? 'checked' : ''}>
          <div class="option-radio"></div>
          <div class="option-info">
            <div class="option-name">${area.name}</div>
            <div class="option-price">₦${area.fee.toLocaleString()}</div>
          </div>
        </label>
      `).join('');
      
      document.getElementById('mainContent').innerHTML = `
        <!-- Order Summary -->
        <div class="summary-card">
          <h2 class="card-title">Order Summary</h2>
          ${orderItemsHtml}
          <div class="summary-row">
            <span>Subtotal</span>
            <span>₦${subtotal.toLocaleString()}</span>
          </div>
          <div class="summary-row">
            <span>Delivery</span>
            <span id="deliveryDisplay">₦${deliveryAreas[0].fee.toLocaleString()}</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="totalDisplay">₦${(subtotal + deliveryAreas[0].fee).toLocaleString()}</span>
          </div>
        </div>
        
        <!-- Delivery Options -->
        <div class="form-card">
          <h2 class="card-title">Delivery Area</h2>
          <div class="delivery-options">
            ${deliveryOptionsHtml}
          </div>
        </div>
        
        <!-- Customer Details -->
        <div class="form-card">
          <h2 class="card-title">Delivery Details</h2>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="fullName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" id="phoneNumber" placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label class="form-label">Delivery Address</label>
            <textarea class="form-input" id="deliveryAddress" placeholder="Enter your complete address"></textarea>
          </div>
        </div>
        
        <button class="place-order-btn" onclick="placeOrder()">
          <i class="fab fa-whatsapp"></i>
          Complete Order on WhatsApp
        </button>
      `;
      
      deliveryFee = deliveryAreas[0].fee;
      selectedArea = deliveryAreas[0].name;
    }
    
    function selectDelivery(index) {
      document.querySelectorAll('.delivery-option').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });
      
      deliveryFee = deliveryAreas[index].fee;
      selectedArea = deliveryAreas[index].name;
      
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      document.getElementById('deliveryDisplay').textContent = `₦${deliveryFee.toLocaleString()}`;
      document.getElementById('totalDisplay').textContent = `₦${(subtotal + deliveryFee).toLocaleString()}`;
    }
    
    function placeOrder() {
      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phoneNumber').value.trim();
      const address = document.getElementById('deliveryAddress').value.trim();
      
      if (!name || !phone || !address) {
        alert('Please fill in all delivery details');
        return;
      }
      
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const total = subtotal + deliveryFee;
      
      const orderText = cart.map(item => 
        `• ${item.name} x${item.quantity} = ₦${(item.price * item.quantity).toLocaleString()}`
      ).join('%0A');
      
      const message = `*New Order from TG's Kitchen*%0A%0A` +
        `*Order Items:*%0A${orderText}%0A%0A` +
        `*Subtotal:* ₦${subtotal.toLocaleString()}%0A` +
        `*Delivery (${selectedArea}):* ₦${deliveryFee.toLocaleString()}%0A` +
        `*Total:* ₦${total.toLocaleString()}%0A%0A` +
        `*Customer Details:*%0A` +
        `Name: ${name}%0A` +
        `Phone: ${phone}%0A` +
        `Address: ${address}`;
      
      // Clear cart
      localStorage.removeItem('cart');
      
      // Open WhatsApp
      window.open(`https://wa.me/2349061120754?text=${message}`, '_blank');
      
      // Redirect to home
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
    }
    
    // Load on page load
    loadCheckout();
  </script>
</body>
</html>
