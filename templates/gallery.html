<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Food Gallery - TG's Kitchen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary-red: #E53935;
      --dark-bg: #1a1a1a;
      --light-pink: #FFEBEE;
      --text-dark: #212121;
      --text-gray: #757575;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: var(--text-dark);
      padding-bottom: 80px;
    }
    
    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #fff 0%, var(--light-pink) 100%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 8px 32px rgba(229, 57, 53, 0.3);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top-color: var(--primary-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary-red);
      animation: fadeInOut 1.5s ease-in-out infinite;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: var(--text-gray);
      margin-top: 8px;
    }
    
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    /* Loading dots animation */
    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .loading-dot {
      width: 10px;
      height: 10px;
      background: var(--primary-red);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite both;
    }
    
    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }
    .loading-dot:nth-child(3) { animation-delay: 0s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .brand-name {
      font-size: 18px;
      font-weight: 700;
    }
    
    /* Main Content */
    .main-content {
      margin-top: 64px;
      padding: 16px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    
    .main-content.loaded {
      opacity: 1;
      transform: translateY(0);
    }
    
    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .page-subtitle {
      color: var(--text-gray);
      font-size: 15px;
      margin-bottom: 20px;
    }
    
    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    @media (min-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    .gallery-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      aspect-ratio: 1;
      cursor: pointer;
      transition: transform 0.3s;
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
    }
    
    .gallery-item:nth-child(1) { animation-delay: 0.1s; }
    .gallery-item:nth-child(2) { animation-delay: 0.15s; }
    .gallery-item:nth-child(3) { animation-delay: 0.2s; }
    .gallery-item:nth-child(4) { animation-delay: 0.25s; }
    .gallery-item:nth-child(5) { animation-delay: 0.3s; }
    .gallery-item:nth-child(6) { animation-delay: 0.35s; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .gallery-item:active {
      transform: scale(0.98);
    }
    
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    
    .gallery-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 20px 12px 12px;
      color: white;
    }
    
    .gallery-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .gallery-category {
      font-size: 12px;
      opacity: 0.9;
    }
    
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox-content {
      max-width: 100%;
      max-height: 80vh;
      position: relative;
    }
    
    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
    }
    
    .lightbox-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 24px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .lightbox-info {
      position: absolute;
      bottom: -60px;
      left: 0;
      right: 0;
      color: white;
      text-align: center;
    }
    
    .lightbox-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .lightbox-desc {
      font-size: 14px;
      opacity: 0.8;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-gray);
      grid-column: 1 / -1;
    }
    
    .empty-state i {
      font-size: 64px;
      margin-bottom: 16px;
      color: #ddd;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      border-top: 1px solid #f0f0f0;
      z-index: 1000;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-gray);
      font-size: 11px;
      padding: 4px 12px;
      transition: all 0.3s ease;
    }
    
    .nav-item.active {
      color: var(--primary-red);
    }
    
    .nav-item i {
      font-size: 22px;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <img src="https://i.postimg.cc/hGWTVJhG/IMG-20250725-135828.jpg" alt="TG's Kitchen" class="loading-logo">
    <div class="loading-spinner"></div>
    <div class="loading-text">Preparing Your Gallery</div>
    <div class="loading-subtext">Delicious moments loading...</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo-section">
      <img src="https://i.postimg.cc/hGWTVJhG/IMG-20250725-135828.jpg" alt="TG's Kitchen" class="logo">
      <span class="brand-name">TG's Kitchen</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <h1 class="page-title">Food Gallery</h1>
    <p class="page-subtitle">A visual feast of our culinary creations</p>
    
    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
      <!-- Loaded dynamically -->
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <div class="lightbox-close" onclick="closeLightbox()">
        <i class="fas fa-times"></i>
      </div>
      <img src="" alt="" id="lightboxImg">
      <div class="lightbox-info">
        <div class="lightbox-title" id="lightboxTitle"></div>
        <div class="lightbox-desc" id="lightboxDesc"></div>
      </div>
    </div>
  </div>
  
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="/menu" class="nav-item">
      <i class="fas fa-utensils"></i>
      <span>Menu</span>
    </a>
    <a href="/gallery" class="nav-item active">
      <i class="fas fa-images"></i>
      <span>Gallery</span>
    </a>
    <a href="/cart" class="nav-item">
      <i class="fas fa-shopping-bag"></i>
      <span>Cart</span>
    </a>
    <a href="/leaderboard" class="nav-item">
      <i class="fas fa-trophy"></i>
      <span>Leaderboard</span>
    </a>
  </nav>

  <script>
    async function loadGallery() {
      try {
        const res = await fetch('/api/gallery');
        const images = await res.json();
        
        const container = document.getElementById('galleryGrid');
        
        if (images.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-images"></i>
              <h3>No gallery images yet</h3>
              <p>Check back soon for delicious photos!</p>
            </div>
          `;
        } else {
          container.innerHTML = images.map((img, index) => `
            <div class="gallery-item" onclick="openLightbox(${index})" style="animation-delay: ${index * 0.05}s">
              <img src="${img.image_url}" alt="${img.title}" loading="lazy">
              <div class="gallery-overlay">
                <div class="gallery-title">${img.title}</div>
                <div class="gallery-category">${img.category || 'Featured'}</div>
              </div>
            </div>
          `).join('');
        }
        
        // Store for lightbox
        window.galleryImages = images;
        
        // Hide loading screen and show content
        setTimeout(() => {
          document.getElementById('loadingScreen').classList.add('hidden');
          document.getElementById('mainContent').classList.add('loaded');
        }, 800);
        
      } catch (e) {
        console.error('Failed to load gallery:', e);
        document.getElementById('galleryGrid').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle"></i>
            <p>Failed to load gallery. Please try again.</p>
          </div>
        `;
        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.add('loaded');
      }
    }
    
    function openLightbox(index) {
      const img = window.galleryImages[index];
      document.getElementById('lightboxImg').src = img.image_url;
      document.getElementById('lightboxTitle').textContent = img.title;
      document.getElementById('lightboxDesc').textContent = img.description || 'Delicious creation from TG\'s Kitchen';
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox(e) {
      if (!e || e.target.id === 'lightbox' || e.target.closest('.lightbox-close')) {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
      }
    }
    
    // Close on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
    
    // Load on page load
    loadGallery();
  </script>
</body>
</html>
