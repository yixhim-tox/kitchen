<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Leaderboard - TG's Kitchen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary-red: #E53935;
      --dark-bg: #1a1a1a;
      --light-pink: #FFEBEE;
      --text-dark: #212121;
      --text-gray: #757575;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: var(--text-dark);
      padding-bottom: 80px;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, var(--primary-red), #ff6b6b);
      padding: 16px;
      z-index: 1000;
      color: white;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .back-btn {
      color: white;
      font-size: 20px;
      text-decoration: none;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .header-title {
      font-size: 20px;
      font-weight: 700;
    }
    
    .header-subtitle {
      text-align: center;
      font-size: 13px;
      opacity: 0.9;
    }
    
    /* Top 3 Section */
    .top-section {
      background: linear-gradient(135deg, var(--primary-red), #ff6b6b);
      padding: 80px 20px 100px;
      position: relative;
    }
    
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .podium-rank {
      position: absolute;
      top: -10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
      z-index: 10;
    }
    
    .rank-1 .podium-rank { background: var(--gold); color: #333; }
    .rank-2 .podium-rank { background: var(--silver); color: #333; }
    .rank-3 .podium-rank { background: var(--bronze); color: white; }
    
    .podium-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      background: #f0f0f0;
    }
    
    .rank-1 .podium-avatar {
      width: 100px;
      height: 100px;
      border-width: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .crown {
      position: absolute;
      top: -35px;
      font-size: 28px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    
    .podium-info {
      text-align: center;
      margin-top: 12px;
      color: white;
    }
    
    .podium-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .podium-score {
      font-size: 18px;
      font-weight: 700;
    }
    
    .podium-label {
      font-size: 11px;
      opacity: 0.9;
    }
    
    /* List Section */
    .list-section {
      background: white;
      border-radius: 24px 24px 0 0;
      margin-top: -30px;
      position: relative;
      z-index: 5;
      padding: 24px 16px;
      min-height: 300px;
    }
    
    .list-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #fafafa;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: transform 0.2s;
    }
    
    .leaderboard-item:active {
      transform: scale(0.98);
    }
    
    .item-rank {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      margin-right: 12px;
      color: var(--text-gray);
    }
    
    .item-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 12px;
      background: #f0f0f0;
    }
    
    .item-info {
      flex: 1;
    }
    
    .item-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 2px;
    }
    
    .item-score {
      font-size: 13px;
      color: var(--text-gray);
    }
    
    .item-plates {
      font-weight: 700;
      font-size: 16px;
      color: var(--primary-red);
    }
    
    /* Loading */
    .loading-container {
      text-align: center;
      padding: 40px;
      color: var(--text-gray);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      border-top: 1px solid #f0f0f0;
      z-index: 1000;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-gray);
      font-size: 11px;
      padding: 4px 12px;
    }
    
    .nav-item.active {
      color: var(--primary-red);
    }
    
    .nav-item i {
      font-size: 22px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h1 class="header-title">Top Customers</h1>
      <span style="width: 40px;"></span>
    </div>
    <p class="header-subtitle">Most loyal food lovers this month</p>
  </header>

  <!-- Top 3 Podium -->
  <section class="top-section">
    <div class="podium" id="podium">
      <div class="loading-container" style="color: white;">
        <div class="spinner" style="border-color: rgba(255,255,255,0.3); border-top-color: white;"></div>
        <p>Loading leaderboard...</p>
      </div>
    </div>
  </section>

  <!-- List Section -->
  <section class="list-section">
    <h2 class="list-title">Rankings 4-20</h2>
    <div id="leaderboardList">
      <!-- Loaded dynamically -->
    </div>
  </section>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="/menu" class="nav-item">
      <i class="fas fa-utensils"></i>
      <span>Menu</span>
    </a>
    <a href="/gallery" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Gallery</span>
    </a>
    <a href="/cart" class="nav-item">
      <i class="fas fa-shopping-bag"></i>
      <span>Cart</span>
    </a>
    <a href="/leaderboard" class="nav-item active">
      <i class="fas fa-trophy"></i>
      <span>Leaderboard</span>
    </a>
  </nav>

  <script>
    const defaultImg = 'https://i.postimg.cc/RFQyqcrR/IMG-20260222-WA0018.jpg';
    
    async function loadLeaderboard() {
      try {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        
        // Sort by rank
        data.sort((a, b) => (a.rank || 0) - (b.rank || 0));
        
        renderPodium(data.filter(p => p.rank >= 1 && p.rank <= 3));
        renderList(data.filter(p => p.rank >= 4 && p.rank <= 20));
      } catch (e) {
        console.error('Failed to load leaderboard:', e);
        document.getElementById('podium').innerHTML = `
          <div style="text-align: center; color: white;">
            <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 16px;"></i>
            <p>Failed to load leaderboard</p>
          </div>
        `;
      }
    }
    
    function renderPodium(top3) {
      const container = document.getElementById('podium');
      
      if (top3.length === 0) {
        container.innerHTML = '<p style="color: white; text-align: center;">No data yet</p>';
        return;
      }
      
      // Arrange: 2nd, 1st, 3rd
      const rank2 = top3.find(p => p.rank === 2);
      const rank1 = top3.find(p => p.rank === 1);
      const rank3 = top3.find(p => p.rank === 3);
      
      let html = '';
      
      if (rank2) {
        html += createPodiumItem(rank2, 'rank-2', 2);
      }
      if (rank1) {
        html += createPodiumItem(rank1, 'rank-1', 1, true);
      }
      if (rank3) {
        html += createPodiumItem(rank3, 'rank-3', 3);
      }
      
      container.innerHTML = html;
    }
    
    function createPodiumItem(person, className, rank, hasCrown = false) {
      const plates = person.plates || person.score || 0;
      return `
        <div class="podium-item ${className}">
          ${hasCrown ? '<div class="crown">👑</div>' : ''}
          <div class="podium-rank">${rank}</div>
          <img src="${person.img || defaultImg}" alt="${person.player}" class="podium-avatar" onerror="this.src='${defaultImg}'">
          <div class="podium-info">
            <div class="podium-name">${person.player || 'Unknown'}</div>
            <div class="podium-score">${plates}</div>
            <div class="podium-label">Plates</div>
          </div>
        </div>
      `;
    }
    
    function renderList(rest) {
      const container = document.getElementById('leaderboardList');
      
      if (rest.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--text-gray); padding: 20px;">No more rankings</p>';
        return;
      }
      
      container.innerHTML = rest.map(person => {
        const plates = person.plates || person.score || 0;
        return `
          <div class="leaderboard-item">
            <div class="item-rank">${person.rank}</div>
            <img src="${person.img || defaultImg}" alt="${person.player}" class="item-avatar" onerror="this.src='${defaultImg}'">
            <div class="item-info">
              <div class="item-name">${person.player || 'Unknown'}</div>
              <div class="item-score">${plates} Plates ordered</div>
            </div>
            <div class="item-plates">#${person.rank}</div>
          </div>
        `;
      }).join('');
    }
    
    // Load on page load
    loadLeaderboard();
  </script>
</body>
</html>
